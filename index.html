<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Celeste</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2b1e3a 0%, #4a3a6e 40%, #7d6b9b 100%);
            overflow-x: hidden;
            font-family: 'Courier New', monospace;
            position: relative;
        }

        * {
            cursor: none !important;
        }

        #cursor {
            position: fixed;
            left: 0;
            top: 0;
            width: 18px;
            height: 18px;
            background: #f7f0ff;
            border-radius: 8px;
            opacity: 0.35;
            z-index: 99999998;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: 0.2s ease-in-out;
            transition-property: background, opacity, transform;
            box-shadow: 0 0 6px rgba(255,255,200,0.6);
        }

        #cursor-dot {
            position: fixed;
            left: 0;
            top: 0;
            width: 10px;
            height: 10px;
            background: #fff9e8;
            border-radius: 999px;
            z-index: 99999999;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: opacity 0.2s ease-in-out;
            filter: blur(0.5px);
        }

        #cursor.hidden, #cursor-dot.hidden { opacity: 0; }
        #cursor.hover { transform: translate(-50%, -50%) scale(1.5); opacity: 0.6; background: #ffdfb3; }
        #cursor.active { transform: translate(-50%, -50%) scale(0.8); opacity: 0.45; background: #ffe0a3; }

        .stars-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: radial-gradient(circle, #fff, rgba(255,245,210,0.8));
            border-radius: 50%;
            opacity: 0;
            animation: starFade 4s infinite alternate;
        }
        @keyframes starFade {
            0% { opacity: 0.1; transform: scale(0.8); }
            100% { opacity: 0.9; transform: scale(1.2); }
        }

        .cloud {
            position: absolute;
            background: rgba(255, 248, 225, 0.45);
            border-radius: 80% 20% 70% 30% / 60% 50% 50% 40%;
            filter: blur(8px);
            z-index: 1;
            pointer-events: none;
            animation: driftCloud linear infinite;
        }
        @keyframes driftCloud {
            0% { transform: translateX(-20vw); }
            100% { transform: translateX(120vw); }
        }

        .mountain-scene {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70vh;
            z-index: 2;
            pointer-events: none;
        }

        .range-back {
            position: absolute;
            bottom: 0;
            left: -5%;
            width: 110%;
            height: 100%;
            background: linear-gradient(120deg, #5f5080, #3f2e5a);
            clip-path: polygon(0% 100%, 0% 65%, 12% 40%, 28% 62%, 42% 28%, 58% 55%, 74% 35%, 88% 58%, 100% 42%, 100% 100%);
            opacity: 0.7;
            transition: transform 0.1s ease-out;
            z-index: 1;
        }

        .front-range {
            position: absolute;
            bottom: 0;
            left: -5%;
            width: 110%;
            height: 100%;
            transition: transform 0.1s ease-out;
            z-index: 3;
        }

        .peak-main {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #1e132f 0%, #2c1d44 60%, #19102b 100%);
            clip-path: polygon(
                0% 100%, 0% 72%, 
                8% 58%, 18% 68%, 
                28% 48%, 38% 62%, 
                50% 18%,
                62% 52%, 72% 38%, 
                84% 56%, 92% 44%, 
                100% 62%, 100% 100%
            );
            box-shadow: inset 0 15px 20px rgba(0,0,0,0.3);
        }

        .peak-main::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            clip-path: inherit;
            background: radial-gradient(ellipse 70% 60% at 50% 18%, 
                #ffffff 0%, 
                #fff9f0 20%, 
                #f2eaff 45%, 
                rgba(210, 190, 230, 0.4) 70%,
                transparent 95%);
            filter: none;
            opacity: 1;
            pointer-events: none;
        }

        .peak-main::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            clip-path: inherit;
            background: linear-gradient(125deg, 
                rgba(255, 255, 255, 0.5) 0%, 
                rgba(255, 255, 255, 0.1) 30%,
                transparent 70%);
            mix-blend-mode: soft-light;
            pointer-events: none;
        }

        .flag-wrapper {
            position: absolute;
            left: 50%;
            top: 18%;
            transform: translate(-50%, -100%);
            width: 36px;
            height: 52px;
            z-index: 15;
            pointer-events: none;
        }
        .flag-pole {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 2.5px;
            height: 100%;
            background: #e7cf9e;
            transform: translateX(-50%);
            box-shadow: 0 0 3px #ffefb0;
        }
        .flag-cloth {
            position: absolute;
            top: 0;
            left: 50%;
            width: 24px;
            height: 14px;
            background: #f2554c;
            transform: translateX(-2px);
            clip-path: polygon(0% 0%, 100% 0%, 85% 55%, 100% 100%, 0% 100%);
            animation: flagFlap 0.9s ease-in-out infinite alternate;
            transform-origin: left center;
            box-shadow: 0 1px 5px rgba(0,0,0,0.3);
        }
        @keyframes flagFlap {
            0% { transform: translateX(-2px) skewY(-2deg) scaleX(0.98); }
            100% { transform: translateX(-2px) skewY(3deg) scaleX(1.02); }
        }

        .mist {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(0deg, rgba(30,20,50,0.5), transparent);
            z-index: 5;
            pointer-events: none;
        }

        .quote {
            position: fixed;
            bottom: 8%;
            left: 0;
            right: 0;
            text-align: center;
            color: #f7eedb;
            text-shadow: 0 2px 8px #1e102e;
            font-family: monospace;
            letter-spacing: 2px;
            z-index: 20;
            pointer-events: none;
            font-size: 1.1rem;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            display: inline-block;
            width: fit-content;
            margin: 0 auto;
            padding: 8px 18px;
            border-radius: 40px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .canvas-container {
            position: absolute;
            left: 50%;
            top: calc(18% - 80px);
            transform: translateX(-50%);
            z-index: 25;
            pointer-events: auto;
            text-align: center;
        }
        .canvas-container p {
            color: white;
            font-size: 12px;
            margin-top: 8px;
            opacity: 0.7;
            font-family: monospace;
            pointer-events: none;
        }
        canvas {
            display: block;
            margin: 0 auto;
            cursor: move;
        }

        @media (max-width: 600px) {
            .quote { font-size: 0.8rem; white-space: nowrap; bottom: 5%; }
            .flag-wrapper { width: 28px; height: 42px; }
            .flag-cloth { width: 20px; height: 12px; }
            .canvas-container { top: calc(18% - 60px); transform: translateX(-50%) scale(0.7); }
        }
    </style>
    <script src="zdog.min.js"></script>
</head>
<body>

    <div class="stars-layer" id="starsContainer"></div>

    <div class="cloud" style="width: 180px; height: 70px; top: 12%; left: -10%; animation-duration: 35s; filter: blur(12px);"></div>
    <div class="cloud" style="width: 240px; height: 85px; top: 28%; left: -20%; animation-duration: 48s; opacity: 0.6; filter: blur(10px);"></div>
    <div class="cloud" style="width: 150px; height: 55px; top: 55%; left: -5%; animation-duration: 27s; opacity: 0.5;"></div>

    <div class="mountain-scene">
        <div class="range-back" id="backRange"></div>
        <div class="front-range" id="frontRange">
            <div class="peak-main"></div>
            <div class="flag-wrapper">
                <div class="flag-pole"></div>
                <div class="flag-cloth"></div>
            </div>
        </div>
    </div>
<div class="canvas-container">
    <canvas class="illo" width="160" height="160" style="width: 160px; height: 160px;"></canvas>
</div>

    <div class="mist"></div>
    <div class="quote">CELESTE</div>

    <div id="cursor" class="hidden"></div>
    <div id="cursor-dot" class="hidden"></div>

    <script src="cursor.js"></script>
    <script>
        (function() {
            const starsContainer = document.getElementById('starsContainer');
            const starCount = 140;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 2.2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 70 + '%';
                star.style.animationDelay = Math.random() * 6 + 's';
                star.style.animationDuration = Math.random() * 4 + 2 + 's';
                star.style.opacity = 0.3 + Math.random() * 0.6;
                starsContainer.appendChild(star);
            }
        })();

        (function() {
            const backRange = document.getElementById('backRange');
            const frontRange = document.getElementById('frontRange');
            if (!backRange || !frontRange) return;
            let lastMouseX = window.innerWidth / 2;
            let lastMouseY = window.innerHeight / 2;

            function applyParallax(x, y) {
                const moveX = (x / window.innerWidth) - 0.5;
                const moveY = (y / window.innerHeight) - 0.5;
                frontRange.style.transform = `translate(${moveX * -28}px, ${moveY * -8}px)`;
                backRange.style.transform = `translate(${moveX * -14}px, ${moveY * -4}px)`;
            }

            window.addEventListener('mousemove', (e) => {
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                applyParallax(lastMouseX, lastMouseY);
            });
            window.addEventListener('load', () => {
                applyParallax(lastMouseX, lastMouseY);
            });
            window.addEventListener('resize', () => {
                applyParallax(lastMouseX, lastMouseY);
            });
        })();

        (function() {
            var illoElem = document.querySelector('.illo');
            var w = 400;   // 想要的宽度
            var h = 250;   // 想要的高度
            var zoom = 1.8;  // 不再自动缩放，直接使用原始尺寸
            illoElem.setAttribute( 'width', w );
            illoElem.setAttribute( 'height', h );
            illoElem.style.width = w + 'px';
            illoElem.style.height = h + 'px';

            var isSpinning = true;
            var TAU = Zdog.TAU;

            var illo = new Zdog.Illustration({
                element: illoElem,
                zoom: zoom,
                rotate: { y: -TAU/4 },
                dragRotate: true,
                onDragStart: function() {
                    isSpinning = false;
                },
            });

            var madColor = {
                skin: '#FD9',
                hair: '#D53',
                parkaLight: '#67F',
                parkaDark: '#35D',
                tight: '#742',
                eye: '#333',
            };
            var badColor = {
                skin: '#EBC',
                hair: '#D4B',
                parkaLight: '#85A',
                parkaDark: '#527',
                tight: '#412',
                eye: '#D02',
            };

            var glow = 'hsla(60, 100%, 80%, 0.3)';
            var featherGold = '#FE5';

            var BokehShape = Zdog.Shape.subclass({
                bokehSize: 5,
                bokehLimit: 64,
            });

            BokehShape.prototype.updateBokeh = function() {
                this.bokeh = Math.abs( this.sortValue ) / this.bokehLimit;
                this.bokeh = Math.max( 0, Math.min( 1, this.bokeh ) );
                return this.bokeh;
            };

            BokehShape.prototype.getLineWidth = function() {
                return this.stroke + this.bokehSize * this.bokeh * this.bokeh;
            };

            BokehShape.prototype.getBokehAlpha = function() {
                var alpha = 1 - this.bokeh;
                alpha *= alpha;
                return alpha * 0.8 + 0.2;
            };

            BokehShape.prototype.renderCanvasDot = function( ctx ) {
                this.updateBokeh();
                ctx.globalAlpha = this.getBokehAlpha();
                Zdog.Shape.prototype.renderCanvasDot.apply( this, arguments );
                ctx.globalAlpha = 1;
            };

            BokehShape.prototype.renderPath = function( ctx, renderer ) {
                this.updateBokeh();
                if ( renderer.isCanvas ) {
                    ctx.globalAlpha = this.getBokehAlpha();
                }
                Zdog.Shape.prototype.renderPath.apply( this, arguments );
                if ( renderer.isCanvas ) {
                    ctx.globalAlpha = 1;
                }
            };

            function makeMadeline( isGood, colors, options ) {
                var rotor = new Zdog.Anchor( options );
                var body = new Zdog.Group({
                    addTo: rotor,
                    rotate: { x: -TAU/8 },
                    translate: { z: -48 },
                    updateSort: true,
                });
                var head = new Zdog.Anchor({
                    addTo: body,
                    translate: { y: -11, z: -2 },
                    rotate: { x: TAU/8 },
                });
                var face = new Zdog.Ellipse({
                    diameter: 6,
                    addTo: head,
                    translate: { z: 4 },
                    stroke: 8,
                    color: colors.skin,
                });
                var eyeGroup = new Zdog.Group({
                    addTo: face,
                    translate: { z: face.stroke/2 - 0.5 },
                });
                [ -1, 1 ].forEach( function( xSide ) {
                    if ( isGood ) {
                        new Zdog.Ellipse({
                            width: 2,
                            height: 1.3,
                            addTo: eyeGroup,
                            translate: { x: 4.5*xSide, y: 3, z: -1 },
                            rotate: { y: -TAU/16*xSide },
                            stroke: 1,
                            color: '#FA8',
                            fill: true,
                        });
                    }
                    var eyeX = 3.5*xSide;
                    new Zdog.Ellipse({
                        width: 0.75,
                        height: 1.5,
                        addTo: eyeGroup,
                        color: colors.eye,
                        translate: { x: eyeX },
                        stroke: 2,
                        fill: true,
                    });
                    new Zdog.Ellipse({
                        addTo: eyeGroup,
                        height: 3,
                        width: 1.2,
                        quarters: 2,
                        translate: { x: eyeX, y: -3 },
                        rotate: { z: -TAU/4 + 0.15*xSide * (isGood ? 1 : -1) },
                        color: colors.hair,
                        stroke: 1,
                        fill: false,
                        closed: true,
                    });
                });
                new Zdog.Shape({
                    path: [
                        { x: -1 },
                        { x: 1 },
                        { z: -4 },
                    ],
                    addTo: head,
                    translate: { y: -4, z: -1 },
                    stroke: 18,
                    color: colors.hair,
                });
                var bang = new Zdog.Shape({
                    path: [
                        {},
                        { arc: [
                            { z: 4, y: 4 },
                            { z: 0, y: 8 },
                        ]},
                    ],
                    addTo: head,
                    translate: { x: 2, y: -7.5, z: 6 },
                    rotate: { x: 0.5, z: -0.5 },
                    stroke: 4,
                    color: colors.hair,
                    closed: false,
                });
                bang.copy({
                    translate: { x: 5, y: -6, z: 5 },
                    rotate: { x: -0.3, z: -0.5 },
                });
                bang.copy({
                    translate: { x: 5, y: -6, z: 3 },
                    rotate: { y: -0.7, z: -1 },
                });
                bang.copy({
                    translate: { x: -2, y: -7.5, z: 6 },
                    rotate: { x: 0, z: TAU/16*6 },
                });
                bang.copy({
                    translate: { x: -5, y: -6, z: 5 },
                    rotate: { x: 0, z: TAU/4 },
                });
                bang.copy({
                    translate: { x: -5, y: -6, z: 3 },
                    rotate: { y: 0.7, z: 1 },
                });
                new Zdog.Shape({
                    path: [
                        { x: -3 },
                        { x:  3 },
                    ],
                    addTo: head,
                    stroke: 7,
                    translate: { y: -8, z: 5 },
                    color: colors.hair,
                });
                var trailLock = new Zdog.Shape({
                    path: [
                        { y: -4, z: 0 },
                        { bezier: [
                            { y: -10, z: -14 },
                            { y: 0, z: -16 },
                            { y: 0, z: -26 }
                        ]},
                    ],
                    addTo: head,
                    translate: { z: -4, y: 0 },
                    stroke: 10,
                    color: colors.hair,
                    closed: false,
                });
                trailLock.copy({
                    translate: { x: -3, z: -4 },
                    rotate: { z: -TAU/8 },
                    stroke: 8,
                });
                trailLock.copy({
                    translate: { x: 3, z: -4 },
                    rotate: { z: TAU/8 },
                    stroke: 8,
                });
                trailLock.copy({
                    translate: { y: 2 },
                    scale: { y: 0.5 },
                    stroke: 8,
                });
                var torsoRib = new Zdog.Ellipse({
                    width: 12,
                    height: 10,
                    addTo: body,
                    rotate: { x: -TAU/4 },
                    translate: { y: -1 },
                    stroke: 6,
                    color: colors.parkaLight,
                    fill: true,
                });
                torsoRib.copy({
                    width: 6,
                    height: 6,
                    translate: { y: -5 },
                });
                torsoRib.copy({
                    translate: { y: 3 },
                });
                torsoRib.copy({
                    translate: { y: 7 },
                    color: colors.parkaDark,
                });
                new Zdog.Ellipse({
                    width: 10,
                    height: 8,
                    addTo: body,
                    rotate: { x: -TAU/4 },
                    translate: { y: 11 },
                    stroke: 4,
                    color: colors.tight,
                    fill: true,
                });
                [ -1, 1 ].forEach( function( xSide ) {
                    var isLeft = xSide == 1;
                    new Zdog.Shape({
                        addTo: body,
                        stroke: 6,
                        translate: { x: 6*xSide, y: -5, z: -1 },
                        color: colors.parkaLight,
                    });
                    var shoulderJoint = new Zdog.Anchor({
                        addTo: body,
                        translate: { x: 9*xSide, y: -3, z: -2 },
                        rotate: isLeft ? { x: TAU/8*3, z: -TAU/32 } : { z: TAU/16*2, x: -TAU/16*2 },
                    });
                    var armRib = new Zdog.Ellipse({
                        diameter: 2,
                        rotate: { x: -TAU/4 },
                        addTo: shoulderJoint,
                        translate: { x: 0*xSide },
                        stroke: 6,
                        color: colors.parkaLight,
                        fill: true,
                    });
                    armRib.copy({
                        translate: { y: 4 },
                    });
                    var elbowJoint = new Zdog.Anchor({
                        addTo: shoulderJoint,
                        translate: { y: 8 },
                        rotate: isLeft ? {} : { z: TAU/8 },
                    });
                    armRib.copy({
                        addTo: elbowJoint,
                        translate: { x: 0, y: 0 },
                    });
                    armRib.copy({
                        addTo: elbowJoint,
                        translate: { y: 4 },
                        color: colors.parkaDark,
                    });
                    new Zdog.Shape({
                        addTo: elbowJoint,
                        translate: { y: 9, z: -1 },
                        stroke: 8,
                        color: colors.skin,
                    });
                    var knee = { y: 7 };
                    var thigh = new Zdog.Shape({
                        path: [ { y: 0 }, knee ],
                        addTo: body,
                        translate: { x: 4*xSide, y: 13 },
                        rotate: isLeft ? {} : { x: TAU/16*3, z: TAU/16 },
                        stroke: 8,
                        color: colors.tight,
                    });
                    var shin = new Zdog.Shape({
                        path: [ { y: 0 }, { y: 8 } ],
                        addTo: thigh,
                        stroke: 6,
                        translate: knee,
                        rotate: isLeft ? {} : { x: -TAU/16*5 },
                        color: colors.tight,
                    });
                });
                new Zdog.Shape({
                    path: [
                        { x: -3 },
                        { x: 3 },
                    ],
                    visible: false,
                    addTo: body,
                    translate: { y: 11, z: -2 },
                    stroke: 8,
                    color: colors.tight,
                });
            }

            window.makeBird = function( options ) {
                var spin = options.spin || 0;
                var arrow = new Zdog.Anchor({
                    addTo: options.addTo,
                    scale: 2/3,
                    rotate: { z: spin },
                });
                var bird = new Zdog.Group({
                    addTo: arrow,
                    translate: { x: 87 },
                    rotate: { x: -spin },
                });
                new Zdog.Shape({
                    path: [
                        { x: -3, y: 0 },
                        { arc: [
                            { x: -2, y: 1.5 },
                            { x: 0, y: 1.5 },
                        ]},
                        { arc: [
                            { x: 2, y: 1.5 },
                            { x: 2, y: 0 },
                        ]},
                    ],
                    addTo: bird,
                    translate: { x: 0.5 },
                    stroke: 3,
                    color: options.color,
                    fill: true,
                });
                new Zdog.Shape({
                    translate: { x: 4, y: -1 },
                    addTo: bird,
                    stroke: 4,
                    color: options.color,
                });
                new Zdog.Shape({
                    path: [
                        { x: 0, y: -1 },
                        { x: 3, y: 0 },
                        { x: 0, y: 1 },
                    ],
                    addTo: bird,
                    translate: { x: 5, y: -1 },
                    stroke: 1,
                    color: options.color,
                    fill: true,
                });
                new Zdog.Shape({
                    path: [
                        { x: -3, z: -2 },
                        { x:  0, z:  0 },
                        { x: -3, z:  2 },
                    ],
                    addTo: bird,
                    translate: { x: -4, y: 0 },
                    stroke: 2,
                    color: options.color,
                    fill: true,
                });
                var wing = new Zdog.Shape({
                    path: [
                        { x: 3, y: 0 },
                        { x: -1, y: -9 },
                        { arc: [
                            { x: -5, y: -4 },
                            { x: -3, y: 0 },
                        ]},
                    ],
                    addTo: bird,
                    translate: { z: -1.5},
                    rotate: { x: TAU/8 },
                    stroke: 1,
                    color: options.color,
                    fill: true,
                });
                wing.copy({
                    translate: { z: 1.5},
                    scale: { z: -1 },
                    rotate: { x: -TAU/8 },
                });
            };

            makeMadeline( true, madColor, { addTo: illo } );
            makeMadeline( false, badColor, { addTo: illo, rotate: { y: TAU/2 } } );

            var feather = new Zdog.Group({
                addTo: illo,
                rotate: { y: -TAU/4 },
            });
            (function() {
                var featherPartCount = 8;
                var radius = 12;
                var angleX = (TAU/featherPartCount) / 2;
                var sector = (TAU * radius)/2 / featherPartCount;
                for ( var i=0; i < featherPartCount; i++ ) {
                    var curve = Math.cos( (i/featherPartCount) * TAU*3/4 + TAU*1/4 );
                    var x = 4 - curve*2;
                    var y0 = sector/2;
                    var isLast = i == featherPartCount - 1;
                    var y3 = isLast ? sector * -1 : -y0;
                    var z1 = -radius + 2 + curve*-1.5;
                    var z2 = isLast ? -radius : -radius;
                    var barb = new Zdog.Shape({
                        path: [
                            { x: 0, y: y0, z: -radius },
                            { x: x, y: -sector/2, z: z1 },
                            { x: x, y: -sector*3/4, z: z1 },
                            { x: 0, y: y3, z: z2 },
                        ],
                        addTo: feather,
                        rotate: { x: angleX * -i + TAU/8 },
                        stroke: 1,
                        color: featherGold,
                        fill: true,
                    });
                    barb.copy({
                        scale: { x: -1 },
                    });
                }
                var rachis = new Zdog.Ellipse({
                    addTo: feather,
                    diameter: radius*2,
                    quarters: 2,
                    rotate: { y: -TAU/4 },
                    stroke: 2,
                    color: featherGold,
                });
                rachis.copy({
                    stroke: 8,
                    color: glow,
                    rotate: { y: -TAU/4, x: -0.5 }
                });
            })();

            (function() {
                var rodCount = 14;
                for ( var i=0; i < rodCount; i++ ) {
                    var zRotor = new Zdog.Anchor({
                        addTo: illo,
                        rotate: { z: TAU/rodCount * i },
                    });
                    var y0 = 32;
                    var y1 = y0 + 2 + Math.random()*24;
                    new BokehShape({
                        path: [
                            { y: y0 },
                            { y: y1 },
                        ],
                        addTo: zRotor,
                        rotate: { x: ( Math.random() * 2 - 1 ) * TAU/8 },
                        color: madColor.skin,
                        stroke: 1,
                        bokehSize: 6,
                        bokehLimit: 70,
                    });
                }
            })();

            (function() {
                var dotCount = 64;
                for ( var i=0; i < dotCount; i++ ) {
                    var yRotor = new Zdog.Anchor({
                        addTo: illo,
                        rotate: { y: TAU/dotCount * i },
                    });
                    new BokehShape({
                        path: [
                            { z: 40*(1 - Math.random()*Math.random()) + 32 },
                        ],
                        addTo: yRotor,
                        rotate: { x: ( Math.random() * 2 - 1 ) * TAU*3/16 },
                        color: badColor.skin,
                        stroke: 1 + Math.random(),
                        bokehSize: 6,
                        bokehLimit: 74,
                    });
                }
            })();

            var birdRotor = new Zdog.Anchor({
                addTo: illo,
                rotate: { y: TAU*-1/8 },
            });
            makeBird({ addTo: birdRotor, color: madColor.parkaLight, spin: TAU/2 });
            makeBird({ addTo: birdRotor, color: featherGold, spin: -TAU * 3/8 });
            makeBird({ addTo: birdRotor, color: 'white', spin: -TAU/4 });
            makeBird({ addTo: birdRotor, color: madColor.hair, spin: -TAU/8 });
            makeBird({ addTo: birdRotor, color: madColor.parkaDark, spin: TAU/8 });

            var isSpinning = true;
            var rotateSpeed = -TAU/60;
            var xClock = 0;
            var then = new Date() - 1/60;

            function animate() {
                var now = new Date();
                var delta = now - then;
                if ( isSpinning ) {
                    var theta = rotateSpeed/60 * delta * -1;
                    illo.rotate.y += theta;
                    xClock += theta/4;
                    illo.rotate.x = Math.sin( xClock ) * TAU/12;
                }
                illo.updateGraph();
                illo.renderGraph();
                then = now;
                requestAnimationFrame( animate );
            }
            animate();
        })();
    </script>
</body>
</html>
